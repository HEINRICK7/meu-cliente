name: Deploy to Firebase Hosting on merge

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    env:
      VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
      VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
      VITE_FIRESTORE_DATABASE_ID: ${{ secrets.VITE_FIRESTORE_DATABASE_ID }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
      VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
      VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      VITE_FIREBASE_VAPID_KEY: ${{ secrets.VITE_FIREBASE_VAPID_KEY }}

    steps:
      - uses: actions/checkout@v4

      - run: npm ci

      - name: Check Firebase env vars
        run: |
          node -e "
          const required = [
            'VITE_FIREBASE_API_KEY',
            'VITE_FIREBASE_AUTH_DOMAIN',
            'VITE_FIREBASE_PROJECT_ID',
            'VITE_FIRESTORE_DATABASE_ID',
            'VITE_FIREBASE_STORAGE_BUCKET',
            'VITE_FIREBASE_MESSAGING_SENDER_ID',
            'VITE_FIREBASE_APP_ID',
            'VITE_FIREBASE_VAPID_KEY'
          ];

          let failed = false;

          for (const key of required) {
            const value = process.env[key];

            if (!value || value.trim().length === 0) {
              console.error(key + ' is missing or empty');
              failed = true;
            } else {
              console.log(key + ' OK length=' + value.length);
            }
          }

          if (failed) {
            process.exit(1);
          }
          "

      - run: npm run build

      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MEU_CLIENTE_F17BB }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$HOME/firebase-service-account.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$HOME/firebase-service-account.json"

          set +e
          npx firebase-tools@15.22.3 deploy --only hosting --project meu-cliente-f17bb --non-interactive 2>&1 | tee firebase-deploy.log
          DEPLOY_EXIT=${PIPESTATUS[0]}
          set -e

          if [ "$DEPLOY_EXIT" -eq 0 ]; then
            echo "Firebase deploy completed successfully."
            exit 0
          fi

          if grep -q "is the current active version" firebase-deploy.log; then
            echo "Firebase deploy reached active version. Treating as success."
            exit 0
          fi

          echo "Firebase deploy failed."
          exit "$DEPLOY_EXIT"
