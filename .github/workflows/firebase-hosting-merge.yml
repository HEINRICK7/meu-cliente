name: Deploy to Firebase Hosting on merge

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: npm ci

      - run: npm run build

      - name: Deploy to Firebase Hosting
        env:
          FIREBASE_SERVICE_ACCOUNT_MEU_CLIENTE_F17BB: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_MEU_CLIENTE_F17BB }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT_MEU_CLIENTE_F17BB" > "$HOME/firebase-service-account.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$HOME/firebase-service-account.json"
          npx firebase-tools@15.22.3 deploy --only hosting --project meu-cliente-f17bb
